<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language Recognition - Gemini UI</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for futuristic look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- MediaPipe Hands Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="app-container">
        <!-- Full-screen Background Video -->
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
        <div class="overlay-gradient"></div>

        <!-- Top Header Navigation -->
        <header class="top-bar">
            <div class="top-left">
                <span class="app-id">GLOSS</span>
                <div id="glossContainer" class="gloss-list">
                    <!-- Example Tags (Placeholders for assembled letters) -->
                    <span class="gloss-tag active green">ㄱ</span>
                    <span class="gloss-tag active green">ㅏ</span>
                    <span class="gloss-tag active yellow">ㄴ</span>
                </div>
            </div>
            <div class="top-right">
                <button id="clearBtn" class="action-btn">Clear</button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="content-area">
            <!-- Large Result Sentence Overlay -->
            <div id="finalSentence" class="final-sentence hidden">
                만나서 반갑<span class="strikethrough">습니다</span>
            </div>

            <!-- Real-time Classification Card (Center-Bottom) -->
            <div id="progressCard" class="progress-card">
                <div class="lightning-icon">⚡</div>
                <div class="progress-info">
                    <h2 id="statusTitle">'ㄱ' (Giyeok)</h2>
                    <p id="statusDesc">85% — 실시간 분류 중...</p>
                    <div class="progress-bar-mini">
                        <div id="progressFill" class="progress-fill" style="width: 85%;"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom Controls (Pipeline Stages) -->
        <footer class="bottom-dock">
            <div class="dock-item active">
                <div class="label">1. Hand Tracking</div>
                <div class="active-indicator"></div>
            </div>
            <div class="dock-item">
                <div class="label">2. Classification</div>
            </div>
            <div class="dock-item">
                <div class="label">3. Assembly</div>
            </div>
            <div class="dock-item">
                <div class="label">4. Text Output</div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
